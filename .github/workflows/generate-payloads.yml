name: Generate payloads.json

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  generate-json:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Debug payload folders
        run: |
          echo "Listing BASE_PATH:"
          ls -R PS5_Payloads/payloads || echo "not found"

      - name: Generate payloads.json
        shell: bash
        run: |
          set -euo pipefail

          BASE_PATH="PS5_Payloads/payloads"
          OUTPUT_FILE="PS5_Payloads/payloads.json"
          REPO_URL="https://raw.githubusercontent.com/${{ github.repository }}/main"

          JSON_PAYLOADS="[]"

          for category_dir in "$BASE_PATH"/*; do
            [ -d "$category_dir" ] || continue

            CATEGORY_NAME=$(basename "$category_dir")

            # récupérer les dossiers version valides (commencent par chiffre)
            mapfile -t version_dirs < <(
              find "$category_dir" -mindepth 1 -maxdepth 1 -type d \
              | awk -F/ 'tolower($NF) ~ /^[0-9]/' \
              | sort -V
            )

            if [ "${#version_dirs[@]}" -eq 0 ]; then
              continue
            fi

            LATEST_DIR="${version_dirs[-1]}"
            VERSION=$(basename "$LATEST_DIR")

            ELF_FILE=$(find "$LATEST_DIR" -maxdepth 1 -type f -name "*.elf" | sort | head -n 1 || true)

            if [ -z "$ELF_FILE" ]; then
              continue
            fi

            FILENAME=$(basename "$ELF_FILE")
            CHECKSUM=$(sha256sum "$ELF_FILE" | awk '{print $1}')
            URL="$REPO_URL/$ELF_FILE"

            NAME="$CATEGORY_NAME"
            DESCRIPTION="$CATEGORY_NAME payload"

            # metadata optionnelle
            if [ -f "$category_dir/metadata.json" ]; then
              META_NAME=$(jq -r '.name // empty' "$category_dir/metadata.json" 2>/dev/null || true)
              META_DESC=$(jq -r '.description // empty' "$category_dir/metadata.json" 2>/dev/null || true)

              [ -n "${META_NAME:-}" ] && NAME="$META_NAME"
              [ -n "${META_DESC:-}" ] && DESCRIPTION="$META_DESC"
            fi

            JSON_PAYLOADS=$(echo "$JSON_PAYLOADS" | jq \
              --arg category "$CATEGORY_NAME" \
              --arg name "$NAME" \
              --arg filename "$FILENAME" \
              --arg url "$URL" \
              --arg description "$DESCRIPTION" \
              --arg version "$VERSION" \
              --arg checksum "$CHECKSUM" \
              '. += [{
                category: $category,
                name: $name,
                filename: $filename,
                url: $url,
                description: $description,
                version: $version,
                checksum: $checksum
              }]')
          done

          jq -n \
            --arg name "PS5 Payload Manager Updater (Unofficial)" \
            --argjson payloads "$JSON_PAYLOADS" \
            '{
              name: $name,
              payloads: ($payloads | sort_by(.name))
            }' > "$OUTPUT_FILE"

          echo "Generated file:"
          cat "$OUTPUT_FILE"

      - name: Show git status
        run: |
          git status
          ls -la PS5_Payloads
          cat PS5_Payloads/payloads.json || true

      - name: Commit if changed
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add PS5_Payloads/payloads.json

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update payloads.json"
          git push
