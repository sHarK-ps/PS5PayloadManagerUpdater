name: Deploy to Github Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      force_payload_update:
        description: 'Force payload update even if no changes'
        required: false
        default: 'false'
        type: boolean
  # Twice daily: 00:00 and 12:00 UTC
  schedule:
    - cron: '0 * * * *'    # 00:00 & 12:00 UTC

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-payloads:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.update.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip install pyyaml requests

      - name: Update payloads
        id: update
        run: |
          python .github/scripts/update_payloads.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug git state
        run: |
          echo "===== GIT STATUS ====="
          git status
          echo "===== DIFF ====="
          git diff
          echo "===== STAGED ====="
          git diff --cached         

      - name: Commit changes
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            CHANGES=$(git diff --cached --name-only \
              | grep '^PS5_Payloads/payloads/' \
              | cut -d'/' -f3 \
              | sort -u \
              | tr '\n' ', ' \
              | sed 's/,$//')

            git commit -m "chore(payloads): update ${CHANGES:-payloads}"
            git push
          fi

          #Automated payload update:
          #- Synced with latest GitHub releases
          #- Updated metadata and changelogs
          #- Verified compatibility

  deploy:
    needs: update-payloads
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'PS5_Payloads'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
